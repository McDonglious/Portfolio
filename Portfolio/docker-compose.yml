version: '3.8'

services:
  json-server:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - /var/www/Portfolio/Portfolio:/app
    command: npx json-server --watch db.json --port 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  node:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - /var/www/Portfolio/Portfolio/dist/Portfolio:/app/dist/Portfolio
    command: node dist/Portfolio/server/main.server.mjs
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /var/www/Portfolio/Portfolio/dist/Portfolio/browser:/usr/share/nginx/html/dist/Portfolio/browser
      - /var/www/Portfolio/Portfolio/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node
    restart: unless-stopped
