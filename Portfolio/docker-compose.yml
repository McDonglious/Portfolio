version: '3.8'

services:
  node:
    image: node:20-alpine
    working_dir: /app
    user: "node"
    volumes:
      - /var/www/Portfolio/Portfolio/dist/Portfolio:/app/dist/Portfolio
    command: node dist/Portfolio/server/main.js
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - API_URL=http://json-server:3000  # Add this line!
    restart: unless-stopped
    depends_on:
      json-server:  # Ensure json-server is started first
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /var/www/Portfolio/Portfolio/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node
    restart: unless-stopped

  json-server:
    image: node:20-alpine
    working_dir: /app
    user: "node"
    volumes:
      - /var/www/Portfolio/Portfolio/db.json:/app/db.json
    command: npx json-server --host 0.0.0.0 --watch db.json
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://json-server:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
