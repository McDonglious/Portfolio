version: '3.8'

services:
  portfolio:
    image: nginx:alpine  # Lightweight Nginx image
    container_name: portfolio
    ports:
      - "80:80"          # Host:Container port mapping
    volumes:
      - ./dist/your-angular-app:/usr/share/nginx/html  # Mount built Angular files
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf  # Mount Nginx config
    restart: unless-stopped  # Auto-restart if the container crashes

